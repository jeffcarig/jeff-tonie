<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeff & Tonie ❤️</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffe4ec;
        font-family: Arial, sans-serif;
        overflow: hidden;
        position: relative;
      }

      .container {
        text-align: center;
        padding: 20px;
        z-index: 10;
      }

      h1 {
        color: #ff4081;
        margin-bottom: 10px;
      }

      p {
        color: #666;
        margin-bottom: 30px;
      }

      .buttons {
        position: relative;
        width: 400px;
        height: 200px;
        margin: 0 auto;
      }

      button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: bold;
      }

      #yes {
        background: #4caf50;
        color: white;
        transition: transform 0.2s ease;
      }

      #no {
        position: absolute;
        left: 250px;
        top: 0;
        background: #f44336;
        color: white;
        transition: all 0.2s ease;
      }

      /* HEARTS */
      .heart {
        position: fixed;
        bottom: -80px;
        font-size: 50px;
        animation: floatUp linear infinite;
        opacity: 0.7;
        pointer-events: none;
      }

      @keyframes floatUp {
        from {
          transform: translateY(0) rotate(0deg);
          opacity: 0.9;
        }
        to {
          transform: translateY(-120vh) rotate(360deg);
          opacity: 0;
        }
      }

      /* CONFETTI */
      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        top: -20px;
        z-index: 9999;
        animation: fall 3s linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }

      @media (max-width: 500px) {
        .buttons {
          width: 100%;
          height: 250px;
        }

        button {
          font-size: 16px;
          padding: 12px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Confirm mo nga... asawa mo na ako, diba? 😌❤️</h1>
      <p>Answer carefully. One of the buttons may not cooperate. 🤭</p>

      <div class="buttons">
        <button id="yes">Oo naman! ❤️</button>
        <button id="no">Hindi 😏</button>
      </div>
    </div>

    <script>
      const noBtn = document.getElementById('no');
      const yesBtn = document.getElementById('yes');

      let yesScale = 1;

      function moveButton() {
        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;

        noBtn.style.position = 'fixed';
        noBtn.style.left = Math.random() * maxX + 'px';
        noBtn.style.top = Math.random() * maxY + 'px';

        yesScale += 0.35;
        yesBtn.style.transform = `scale(${yesScale})`;
      }

      noBtn.addEventListener('mouseenter', moveButton);

      noBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        moveButton();
      });

      /* FLOATING HEARTS */
      function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';

        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 60 + 40 + 'px';
        heart.style.animationDuration = Math.random() * 4 + 4 + 's';

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 9000);
      }

      setInterval(createHeart, 600);

      /* CONFETTI */
      function launchConfetti() {
        const colors = ['#ff4081', '#ffeb3b', '#4caf50', '#2196f3', '#ff9800', '#9c27b0'];

        for (let i = 0; i < 150; i++) {
          const confetti = document.createElement('div');
          confetti.classList.add('confetti');

          confetti.style.left = Math.random() * window.innerWidth + 'px';

          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

          confetti.style.transform = `rotate(${Math.random() * 360}deg)`;

          confetti.style.animationDuration = Math.random() * 2 + 2 + 's';

          document.body.appendChild(confetti);

          setTimeout(() => confetti.remove(), 4000);
        }
      }

      yesBtn.addEventListener('click', () => {
        launchConfetti();

        setTimeout(() => {
          document.body.innerHTML = `
          <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:#ffe4ec;
            font-family:Arial,sans-serif;
            text-align:center;
            padding:20px;
          ">
            <h1 style="color:#ff4081;font-size:3rem;">❤️ YAY! ❤️</h1>
            <h2>I Love You, Asawa ko 🥰</h2>
            <h2> Jeff & Tonie</h2>
            <p style="font-size:1.2rem;">
              Sa ayaw at sa gusto mo. Officially walang bawian 💍✨
            </p>
            <p>
              Screenshot taken as evidence for future reference. 📸😂
            </p>
          </div>
        `;
        }, 1200);
      });
    </script>
  </body>
</html>
