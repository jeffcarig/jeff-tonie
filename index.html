<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeff & Tonie ❤️</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffe4ec;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      .container {
        text-align: center;
        padding: 20px;
      }

      h1 {
        color: #ff4081;
        margin-bottom: 10px;
      }

      p {
        color: #666;
        margin-bottom: 30px;
      }

      .buttons {
        position: relative;
        width: 400px;
        height: 200px;
        margin: 0 auto;
      }

      button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: bold;
      }

      #yes {
        background: #4caf50;
        color: white;
        transition: transform 0.2s ease;
      }

      #no {
        position: absolute;
        left: 250px;
        top: 0;
        background: #f44336;
        color: white;
        transition: all 0.2s ease;
      }

      @media (max-width: 500px) {
        .buttons {
          width: 100%;
          height: 250px;
        }

        button {
          font-size: 16px;
          padding: 12px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Confirm mo nga... asawa mo na ako, diba? 😌❤️</h1>
      <p>Answer carefully. One of the buttons may not cooperate. 🤭</p>

      <div class="buttons">
        <button id="yes">Oo naman! ❤️</button>
        <button id="no">Hindi 😏</button>
      </div>
    </div>

    <script>
      const noBtn = document.getElementById('no');
      const yesBtn = document.getElementById('yes');

      let yesScale = 1;

      function moveButton() {
        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;

        noBtn.style.position = 'fixed';
        noBtn.style.left = Math.random() * maxX + 'px';
        noBtn.style.top = Math.random() * maxY + 'px';

        yesScale += 0.15;
        yesBtn.style.transform = `scale(${yesScale})`;
      }

      noBtn.addEventListener('mouseenter', moveButton);

      // Mobile support
      noBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        moveButton();
      });

      yesBtn.addEventListener('click', () => {
        document.body.innerHTML = `
          <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:#ffe4ec;
            font-family:Arial,sans-serif;
            text-align:center;
            padding:20px;
          ">
            <h1 style="color:#ff4081;font-size:3rem;">❤️ YAY! ❤️</h1>
            <h2>I Love You, Asawa ko 🥰</h2>
            <h2> Jeff & Tonie</h2>
            <p style="font-size:1.2rem;">
              Sa ayaw at sa gusto mo. Officially walang bawian 💍✨
            </p>
            <p>
              Screenshot taken as evidence for future reference. 📸😂
            </p>
          </div>
        `;
      });
    </script>
  </body>
</html>
