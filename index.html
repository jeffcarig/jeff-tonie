<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeff & Tonie ❤️</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        overflow: hidden;
        background: linear-gradient(45deg, #ffe4ec, #ffd6e7, #fff0f5);
        background-size: 400% 400%;
        animation: bgMove 10s ease infinite;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        text-align: center;
        padding: 20px;
        z-index: 10;
      }

      h1 {
        color: #ff4081;
        margin-bottom: 10px;
        font-size: 3rem;
      }

      p {
        color: #666;
        margin-bottom: 30px;
        font-size: 1.4rem;
      }

      .buttons {
        position: relative;
        width: 600px;
        height: 300px;
        margin: 0 auto;
      }

      button {
        padding: 20px 40px;
        font-size: 26px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-weight: bold;
      }

      #yes {
        background: #4caf50;
        color: white;
        transition: transform 0.15s ease;
      }

      #no {
        position: absolute;
        left: 250px;
        top: 0;
        background: #f44336;
        color: white;
        transition: all 0.2s ease;
      }

      /* ❤️ hearts */
      .heart {
        position: fixed;
        bottom: -80px;
        font-size: 60px;
        animation: floatUp 6s linear infinite;
        opacity: 0.7;
        pointer-events: none;
      }

      @keyframes floatUp {
        to {
          transform: translateY(-120vh) rotate(360deg);
          opacity: 0;
        }
      }

      /* 🎊 confetti */
      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        top: -20px;
        animation: fall 3s linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }

      /* 💍 LOADING */
      .loading {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: rgba(255, 228, 236, 0.95);
        font-size: 2rem;
        z-index: 999;
      }

      /* second page */
      .final-screen {
        height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        background: linear-gradient(45deg, #ffdde1, #ee9ca7, #ffdde1);
        animation: bgMove 8s infinite;
      }

      .final-screen h1 {
        font-size: 3rem;
        color: #ff4081;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      .typing {
        font-size: 2rem;
        color: white;
        white-space: nowrap;
        overflow: hidden;
        border-right: 3px solid white;
        width: 0;
        animation: typing 3s steps(40) forwards;
      }

      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- ❗ YOUR ORIGINAL TEXT (UNCHANGED) -->
      <h1>Confirm mo nga... asawa mo na ako, diba? 😌❤️</h1>
      <p>Answer carefully. One of the buttons may not cooperate. 🤭</p>

      <div class="buttons">
        <button id="yes">Oo naman! ❤️</button>
        <button id="no">Hindi 😏</button>
      </div>
    </div>

    <div class="loading" id="loading">💍 Preparing marriage contract...</div>

    <script>
      const noBtn = document.getElementById('no');
      const yesBtn = document.getElementById('yes');
      const loading = document.getElementById('loading');

      let yesScale = 1;

      function moveButton() {
        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;

        noBtn.style.position = 'fixed';
        noBtn.style.left = Math.random() * maxX + 'px';
        noBtn.style.top = Math.random() * maxY + 'px';

        yesScale += 0.3;
        yesBtn.style.transform = `scale(${yesScale})`;
      }

      noBtn.addEventListener('mouseenter', moveButton);
      noBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        moveButton();
      });

      function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 80 + 40 + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }

      setInterval(createHeart, 500);

      function launchConfetti() {
        for (let i = 0; i < 120; i++) {
          const c = document.createElement('div');
          c.classList.add('confetti');
          c.style.left = Math.random() * window.innerWidth + 'px';
          c.style.background = ['#ff4081', '#ffeb3b', '#4caf50', '#2196f3'][Math.floor(Math.random() * 4)];
          c.style.animationDuration = Math.random() * 2 + 2 + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 4000);
        }
      }

      function playSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();

        o.type = 'triangle';
        o.frequency.value = 600;
        g.gain.value = 0.2;

        o.connect(g);
        g.connect(ctx.destination);

        o.start();
        o.stop(ctx.currentTime + 0.2);
      }

      function showFinalScreen() {
        document.body.innerHTML = `
          <div class="final-screen">
            <h1>❤️ YAY! ❤️</h1>
            <div class="typing">I Love You, Asawa ko 🥰</div>
            <h2 style="color:white;">Jeff & Tonie</h2>
            <p style="color:white;">Sa ayaw at sa gusto mo. Officially walang bawian 💍✨</p>
            <p style="color:white;">
Screenshot taken as evidence for future reference 📸😂</p>
          </div>
        `;
      }

      yesBtn.addEventListener('click', () => {
        playSound();
        launchConfetti();

        loading.style.display = 'flex';

        setTimeout(() => {
          showFinalScreen();
        }, 2200);
      });
    </script>
  </body>
</html>
