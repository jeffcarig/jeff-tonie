<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeff & Tonie ❤️</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        overflow: hidden;
        background: linear-gradient(45deg, #ffe4ec, #ffd6e7, #fff0f5);
        background-size: 400% 400%;
        animation: bgMove 10s ease infinite;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        text-align: center;
        padding: 20px;
        z-index: 10;
      }

      h1 {
        color: #ff4081;
        font-size: 3rem;
      }

      p {
        color: #666;
        font-size: 1.4rem;
      }

      .buttons {
        position: relative;
        width: 600px;
        height: 300px;
        margin: 0 auto;
      }

      button {
        padding: 20px 40px;
        font-size: 26px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-weight: bold;
      }

      #yes {
        background: #4caf50;
        color: white;
        transition:
          transform 0.15s ease,
          opacity 0.3s ease;
      }

      #no {
        position: absolute;
        left: 250px;
        top: 0;
        background: #f44336;
        color: white;
        transition: all 0.2s ease;
      }

      /* ❤️ hearts */
      .heart {
        position: fixed;
        bottom: -80px;
        font-size: 60px;
        animation: floatUp 6s linear infinite;
        opacity: 0.7;
        pointer-events: none;
      }

      @keyframes floatUp {
        to {
          transform: translateY(-120vh) rotate(360deg);
          opacity: 0;
        }
      }

      /* 💥 explosion particles */
      .particle {
        position: fixed;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        z-index: 9999;
        animation: explode 0.8s ease-out forwards;
      }

      @keyframes explode {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(var(--x), var(--y)) scale(0);
          opacity: 0;
        }
      }

      /* 💍 loading */
      .loading {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: rgba(255, 228, 236, 0.95);
        font-size: 2rem;
        z-index: 999;
      }

      /* final */
      .final-screen {
        height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        background: linear-gradient(45deg, #ffdde1, #ee9ca7, #ffdde1);
        animation: bgMove 8s infinite;
      }

      .typing {
        font-size: 2rem;
        color: white;
        border-right: 3px solid white;
        overflow: hidden;
        white-space: nowrap;
        width: 0;
        animation: typing 3s steps(40) forwards;
      }

      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- 🔒 ORIGINAL TEXT RETAINED -->
      <h1>Confirm mo nga... asawa mo na ako, diba? 😌❤️</h1>
      <p>Answer carefully. One of the buttons may not cooperate. 🤭</p>

      <div class="buttons">
        <button id="yes">Oo naman! ❤️</button>
        <button id="no">Hindi 😏</button>
      </div>
    </div>

    <div class="loading" id="loading">💍 Preparing marriage contract...</div>

    <script>
      const noBtn = document.getElementById('no');
      const yesBtn = document.getElementById('yes');
      const loading = document.getElementById('loading');

      let yesScale = 1;

      function moveButton() {
        const maxX = window.innerWidth - noBtn.offsetWidth;
        const maxY = window.innerHeight - noBtn.offsetHeight;

        noBtn.style.position = 'fixed';
        noBtn.style.left = Math.random() * maxX + 'px';
        noBtn.style.top = Math.random() * maxY + 'px';

        yesScale += 0.3;
        yesBtn.style.transform = `scale(${yesScale})`;
      }

      noBtn.addEventListener('mouseenter', moveButton);
      noBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        moveButton();
      });

      function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 80 + 40 + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }

      setInterval(createHeart, 500);

      /* 💥 EXPLOSION */
      function explode(btn) {
        const rect = btn.getBoundingClientRect();
        const colors = ['#ff4081', '#ffeb3b', '#4caf50', '#2196f3', '#ff9800'];

        for (let i = 0; i < 25; i++) {
          const p = document.createElement('div');
          p.classList.add('particle');

          const angle = Math.random() * 2 * Math.PI;
          const distance = Math.random() * 120;

          p.style.left = rect.left + rect.width / 2 + 'px';
          p.style.top = rect.top + rect.height / 2 + 'px';
          p.style.background = colors[Math.floor(Math.random() * colors.length)];

          p.style.setProperty('--x', Math.cos(angle) * distance + 'px');
          p.style.setProperty('--y', Math.sin(angle) * distance + 'px');

          document.body.appendChild(p);
          setTimeout(() => p.remove(), 800);
        }
      }

      /* 🔊 sound */
      function playSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();

        o.type = 'sine';
        o.frequency.value = 700;
        g.gain.value = 0.15;

        o.connect(g);
        g.connect(ctx.destination);

        o.start();
        o.stop(ctx.currentTime + 0.15);
      }

      function showFinal() {
        document.body.innerHTML = `
          <div class="final-screen">
            <h1 style="animation:pulse 1.5s infinite;">❤️ YAY! ❤️</h1>
            <div class="typing"></div>
            <div class="typing">Jeff & Tonie</div>
            <h2 style="color:white;">I Love You, Asawa ko 🥰</h2>
            <p style="color:white;">Sa ayaw at sa gusto mo. Officially walang bawian. 💍✨</p>
            <p style="color:white;">Screenshot taken as evidence for future reference 📸😂</p>
          </div>
        `;
      }

      function loadingSequence() {
        loading.style.display = 'flex';

        let texts = [
          '💍 Preparing marriage contract...',
          '❤️ Checking compatibility...',
          '💖 Loading forever mode...',
          '😂 No escape detected...'
        ];

        let i = 0;
        const interval = setInterval(() => {
          loading.innerHTML = texts[i];
          i++;
          if (i >= texts.length) clearInterval(interval);
        }, 1200);

        setTimeout(() => {
          showFinal();
        }, 7000);
      }

      yesBtn.addEventListener('click', () => {
        playSound();
        explode(yesBtn);
        loadingSequence();
      });
    </script>
  </body>
</html>
